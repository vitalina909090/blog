services:

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: blog-php
    expose:
      - '9000'
    environment:
      WWWUSER: 1000
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
      - mailpit
    healthcheck:
      test: ["CMD", "pgrep", "php-fpm"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    ports:
      - '80:80'
    volumes:
      - '.:/var/www/html'
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sail
    depends_on:
      php:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    ports:
      - '3306:${DB_PORT:-3306}'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-blog}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - 'blog-mysql:/var/lib/mysql'
    networks:
      - sail

  redis:
    image: redis:alpine
    container_name: blog-redis
    ports:
      - '6379:6379'
    networks:
      - sail

  mailpit:
    image: axllent/mailpit:latest
    container_name: blog-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - sail

  vite:
    image: node:20-alpine
    container_name: blog-vite
    working_dir: /var/www/html
    volumes:
      - '.:/var/www/html'
    ports:
      - '5173:5173'
    networks:
      - sail
    command: ['sh', '-c', 'npm install && npm run dev']
    depends_on:
      - php

networks:
  sail:
    driver: bridge

volumes:
  blog-mysql:
